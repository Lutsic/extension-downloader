<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRX Extension Downloader</title>
  <meta name="description" content="An easy way to get .crx file of any extension on Chrome Web Store!">
  <meta name="keywords" content="extensions,chrome,crx,.crx,crx3,crx file,crx files,download crx,chrome web store,chrome extension">
    <link rel="stylesheet" href="css/main.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="header">
    <h1>Extension downloader</h1>
    <h6>An easy way to get .crx file of any extension on Chrome Web Store!</h6>
</div>

<a href="https://github.com/Lutsic/crx-extension-downloader">
  <img src="img/github_icon.png" class="github_icon">
</a>
    

<div class="content">  
    <div class="extensions-container">
        <div class="sidebar">
        <div class="search-section">
        <input id="global-search-container" placeholder="search..." class="search_box">

        <div class="search-options">
            <label class="toggle-label">
                <input type="checkbox" id="global-toggle">
                <span class="toggle-text text1"><b>Global search</b></span>
                <span id="status" class="text1"><b>✕</b></span>
            </label>
        </div>
    </div>
            <button class="filter-btn active" data-category="all">All</button>
            <button class="filter-btn" data-category="games">Games</button>
            <button class="filter-btn" data-category="vpn">VPN & Privacy</button>
            <button class="filter-btn" data-category="social">Social</button>
            <button class="filter-btn" data-category="ui">Appearance</button>
            <button class="filter-btn" data-category="utils">Utils</button>
            <button class="filter-btn" data-category="themes">Themes</button>
            
        </div>
        <div class="grid" id="extensions-grid"></div>
        <ul id="results" class="results"></ul> 
    </div>
</div>   

<script src="data/extensions.js"></script>
<script src="js/main.js" defer></script>
</body>
</html>
